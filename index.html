<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Code Quest – Øyvalg</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🏝️ Velg øya du står på</h1>
  <p>Klikk på øya for å få et spørsmål</p>

  <div class="islands">
    <button onclick="chooseIsland('variable')">📦 Variabel-øya</button>
    <button onclick="chooseIsland('datatype')">🔤 Datatype-øya</button>
    <button onclick="chooseIsland('object')">🧱 Objekt-øya</button>
    <button onclick="chooseIsland('logic')">🧠 Logikk-øya</button>
    <button onclick="chooseIsland('loop')">🔁 Løkke-øya</button>
    <button onclick="chooseIsland('debug')">🐞 Debug-øya</button>
  </div>

  <div id="questionBox" class="hidden">
    <h2 id="questionText"></h2>
    <div id="answers"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
